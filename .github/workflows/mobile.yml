name: Mobile

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/mobile.yml'
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/mobile.yml'

jobs:
  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -w @discoverly/mobile

      - name: Test
        run: npm run test -w @discoverly/mobile
